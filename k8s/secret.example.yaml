apiVersion: v1
kind: Secret
metadata:
  name: linguamaster-secrets
  namespace: linguamaster
type: Opaque
stringData:
  DATABASE_URL: "postgresql://username:password@postgres:5432/linguamaster"
  GEMINI_API_KEY: "replace_me"
  OPENAI_API_KEY: "replace_me"
  SESSION_SECRET: "replace_me"
  JWT_SECRET: "replace_me"
  STRIPE_SECRET_KEY: "replace_me_optional"
