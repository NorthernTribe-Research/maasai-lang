apiVersion: apps/v1
kind: Deployment
metadata:
  name: linguamaster-api
  labels:
    app.kubernetes.io/name: linguamaster
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: linguamaster
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linguamaster
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/metrics"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: linguamaster
          image: us-central1-docker.pkg.dev/northerntriberesearch/linguamaster/linguamaster:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: linguamaster-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: DATABASE_URL
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: GEMINI_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: OPENAI_API_KEY
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: SESSION_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: linguamaster-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
