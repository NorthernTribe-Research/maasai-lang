name: CodeQL

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "30 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ${{ vars.SECURITY_RUNNER_LABEL || vars.CI_RUNNER_LABEL || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language:
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
