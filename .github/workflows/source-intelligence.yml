name: Source Intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "25 4 * * 1"

concurrency:
  group: source-intelligence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  source-intelligence:
    name: Discover Maasai Media Intelligence
    runs-on: ${{ vars.SECURITY_RUNNER_LABEL || vars.CI_RUNNER_LABEL || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      SOURCE_INTELLIGENCE_OUTPUT: data/registry/maasai_media_intelligence_candidates.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate source intelligence candidate registry
        run: |
          mkdir -p "$(dirname "$SOURCE_INTELLIGENCE_OUTPUT")"
          python scripts/discover_maasai_media_intelligence.py --output "$SOURCE_INTELLIGENCE_OUTPUT"

      - name: Upload source intelligence artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-intelligence-candidate-registry
          path: ${{ env.SOURCE_INTELLIGENCE_OUTPUT }}
          if-no-files-found: error
