name: Dependency Review

on:
  pull_request:
    paths:
      - "requirements*.txt"
      - "space/requirements.txt"
      - "kaggle/requirements-kaggle.txt"
      - ".github/workflows/**"
      - ".github/dependabot.yml"

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ${{ vars.SECURITY_RUNNER_LABEL || vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
