name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint workflow files
        uses: rhysd/actionlint@v1.7.12

  validate:
    name: Repo Validation
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 20
    env:
      GRADIO_ANALYTICS_ENABLED: "False"
      HF_HUB_DISABLE_TELEMETRY: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: python -m compileall src scripts space kaggle

      - name: Generate dataset validation report
        run: python scripts/validate_dataset_complete.py --json > dataset-validation.json

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run Space app smoke check
        run: |
          python -c "import space.app as app; demo = app.build_app(); print(type(demo).__name__); print(app.GRADIO_THEME_ON_LAUNCH)"

      - name: Upload validation report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: dataset-validation
          path: dataset-validation.json
          if-no-files-found: ignore

  docker-smoke:
    name: Docker Smoke
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build runtime image
        run: docker build --tag maasai-space:ci .

      - name: Start container
        run: |
          docker run -d --name maasai-space-ci \
            -p 7860:7860 \
            -e GRADIO_SERVER_NAME=0.0.0.0 \
            -e PORT=7860 \
            -e GRADIO_ANALYTICS_ENABLED=False \
            -e HF_HUB_DISABLE_TELEMETRY=1 \
            maasai-space:ci

      - name: Probe service health
        run: |
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:7860/ > /dev/null; then
              echo "Docker service is healthy on attempt ${attempt}."
              exit 0
            fi
            sleep 2
          done
          echo "Docker service did not become healthy in time."
          docker logs maasai-space-ci
          exit 1

      - name: Capture container logs
        if: always()
        continue-on-error: true
        run: docker logs maasai-space-ci > docker-smoke.log 2>&1 || true

      - name: Upload container logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: docker-smoke-log
          path: docker-smoke.log
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: docker rm -f maasai-space-ci > /dev/null 2>&1 || true
