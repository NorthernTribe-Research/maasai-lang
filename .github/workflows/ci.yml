name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint workflow files
        uses: rhysd/actionlint@v1.7.12

  validate:
    name: Repo Validation
    runs-on: ${{ vars.CI_RUNNER_LABEL || 'ubuntu-latest' }}
    env:
      GRADIO_ANALYTICS_ENABLED: "False"
      HF_HUB_DISABLE_TELEMETRY: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: python -m compileall src scripts space kaggle

      - name: Generate dataset validation report
        run: python scripts/validate_dataset_complete.py --json > dataset-validation.json

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run Space app smoke check
        run: |
          python -c "import space.app as app; demo = app.build_app(); print(type(demo).__name__); print(app.GRADIO_THEME_ON_LAUNCH)"

      - name: Upload validation report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: dataset-validation
          path: dataset-validation.json
          if-no-files-found: ignore
