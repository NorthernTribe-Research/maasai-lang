name: Daily HF Training

on:
  workflow_dispatch:
    inputs:
      max_steps:
        description: Override the daily max steps
        required: false
        default: "800"
      save_steps:
        description: Override checkpoint save frequency
        required: false
        default: "100"
  schedule:
    - cron: "15 2 * * *"

concurrency:
  group: daily-hf-training
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  train:
    name: Resume and Push Checkpoints
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 690
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      HF_DATASET_REPO: ${{ vars.HF_DATASET_REPO }}
      HF_MODEL_REPO: ${{ vars.HF_MODEL_REPO }}
      HF_BASE_MODEL: ${{ vars.HF_BASE_MODEL }}
      HF_DAILY_WORKDIR: ${{ runner.temp }}/maasai-daily-hf
      DEFAULT_MAX_STEPS: "800"
      DEFAULT_SAVE_STEPS: "100"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets and variables
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required."
            exit 1
          fi

          if [ -z "${HF_DATASET_REPO:-}" ]; then
            HF_DATASET_REPO="NorthernTribe-Research/maasai-translation-corpus"
            echo "HF_DATASET_REPO var not set; defaulting to $HF_DATASET_REPO"
          fi

          if [ -z "${HF_MODEL_REPO:-}" ]; then
            HF_MODEL_REPO="NorthernTribe-Research/maasai-en-mt"
            echo "HF_MODEL_REPO var not set; defaulting to $HF_MODEL_REPO"
          fi

          echo "HF_DATASET_REPO=$HF_DATASET_REPO" >> "$GITHUB_ENV"
          echo "HF_MODEL_REPO=$HF_MODEL_REPO" >> "$GITHUB_ENV"

          if [ -z "${HF_BASE_MODEL:-}" ]; then
            echo "HF_BASE_MODEL=google/gemma-3-4b-it" >> "$GITHUB_ENV"
          fi

      - name: Run resumable daily training
        run: |
          REPORT_TO="none"
          if [ -n "${WANDB_API_KEY:-}" ]; then
            REPORT_TO="wandb"
          fi

          MAX_STEPS="${DEFAULT_MAX_STEPS}"
          SAVE_STEPS="${DEFAULT_SAVE_STEPS}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MAX_STEPS="${{ github.event.inputs.max_steps }}"
            SAVE_STEPS="${{ github.event.inputs.save_steps }}"
          fi

          python scripts/train_daily_from_hf.py \
            --dataset-repo "$HF_DATASET_REPO" \
            --model-repo "$HF_MODEL_REPO" \
            --work-dir "$HF_DAILY_WORKDIR" \
            --max-steps "$MAX_STEPS" \
            --save-steps "$SAVE_STEPS" \
            --eval-steps "$SAVE_STEPS" \
            --save-total-limit 3 \
            --per-device-train-batch-size 2 \
            --per-device-eval-batch-size 2 \
            --gradient-accumulation-steps 16 \
            --report-to "$REPORT_TO"

      - name: Upload daily training manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-training-manifest
          path: ${{ runner.temp }}/maasai-daily-hf/run_manifest.json
          if-no-files-found: ignore
