name: Release Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI environment
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql://ci:ci@localhost:5432/linguamaster
          GEMINI_API_KEY=ci-gemini-key
          OPENAI_API_KEY=ci-openai-key
          SESSION_SECRET=ci_session_secret_for_release_gate_1234567890
          JWT_SECRET=ci_jwt_secret_for_release_gate_1234567890
          NODE_ENV=production
          PORT=5000
          API_RATE_LIMIT=100
          AUTH_RATE_LIMIT=5
          AI_RATE_LIMIT=10
          EOF

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke test
        run: bash scripts/smoke-test.sh
