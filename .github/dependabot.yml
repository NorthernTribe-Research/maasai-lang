version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Africa/Nairobi"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Africa/Nairobi"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/space"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Africa/Nairobi"
    labels:
      - "dependencies"
      - "space"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Africa/Nairobi"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 3
