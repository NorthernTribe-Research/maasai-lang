<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NorthernTribe Research | Maasai Language Platform</title>
  <meta
    name="description"
    content="Public documentation and project gateway for the NorthernTribe Research Maasai Language Platform."
  />
  <style>
    :root {
      --bg: #0b1220;
      --card: #101a2f;
      --text: #eaf0ff;
      --muted: #a9b6d8;
      --accent: #7fd16d;
      --accent-2: #4d8bff;
      --border: #243555;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(1200px 500px at 0% 0%, #1a2a4a 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, #131f38 0%, var(--card) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      line-height: 1.2;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    .button {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 600;
      text-align: center;
      border: 1px solid transparent;
    }
    .primary {
      background: linear-gradient(90deg, var(--accent) 0%, #96e288 100%);
      color: #0e1a0f;
    }
    .secondary {
      background: linear-gradient(90deg, var(--accent-2) 0%, #7ab0ff 100%);
      color: #07132a;
    }
    .ghost {
      color: var(--text);
      border-color: var(--border);
      background: #0d162a;
    }
    code {
      background: #0c172b;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 6px;
      color: #d6e3ff;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Maasai Language Platform</h1>
    <p>
      This free GitHub Pages endpoint is the primary public documentation gateway for the project.
      It is fully self-hosted through GitHub Pages.
    </p>

    <div class="grid">
      <a class="button primary" href="./docs/">Open Docs Hub</a>
      <a class="button secondary" href="https://github.com/NorthernTribe-Research/maasai-lang/blob/main/README.md">Project README</a>
      <a class="button ghost" href="https://github.com/NorthernTribe-Research/maasai-lang">Open GitHub Repo</a>
    </div>

    <p>
      GitHub Pages URL:
      <br />
      <code>https://northerntribe-research.github.io/maasai-lang/</code>
    </p>
  </main>
</body>
</html>
